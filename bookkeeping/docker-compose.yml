services:
  postgres:
    image: postgres:16-alpine
    container_name: digiflow-books-db
    environment:
      POSTGRES_DB: digiflow_books
      POSTGRES_USER: books
      POSTGRES_PASSWORD: books
    ports:
      - "5435:5435"
    volumes:
      - books_data:/var/lib/postgresql/data

volumes:
  books_data:
