# Configuration used only when the 'cloud' profile is active
# (SPRING_PROFILES_ACTIVE=cloud), i.e. when running on Cloud Run.
#
# The DB values below are read from environment variables that we set on the
# Cloud Run service. Nothing secret is hard-coded here.
spring:
  # No Docker daemon in the container — don't try to start docker-compose.
  docker:
    compose:
      enabled: false

  datasource:
    # Connect to Cloud SQL through Google's socket factory (no IP/SSL setup needed).
    # INSTANCE_CONNECTION_NAME looks like: my-project:europe-north1:digiflow-books
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    hibernate:
      # Kept as 'update' so the schema is created on first deploy, matching the
      # dev setup. Learning exercise (README roadmap #1): switch to Flyway + 'validate'.
      ddl-auto: update

  thymeleaf:
    # Cache templates in production for speed.
    cache: true
