<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fi">
<head th:replace="~{fragments :: head('Etusivu')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <div th:replace="~{fragments :: messages}"></div>

    <h1 th:text="'Yhteenveto ' + ${year}">Yhteenveto</h1>

    <div class="cards">
        <div class="card">
            <div class="label">Tulot (sis. alv)</div>
            <div class="value" th:text="${#numbers.formatDecimal(income, 1, 'WHITESPACE', 2, 'COMMA')} + ' €'">0,00 €</div>
        </div>
        <div class="card">
            <div class="label">Menot (sis. alv)</div>
            <div class="value" th:text="${#numbers.formatDecimal(expenses, 1, 'WHITESPACE', 2, 'COMMA')} + ' €'">0,00 €</div>
        </div>
        <div class="card">
            <div class="label">Tulos</div>
            <div class="value" th:classappend="${result.signum() < 0} ? 'negative' : 'positive'"
                 th:text="${#numbers.formatDecimal(result, 1, 'WHITESPACE', 2, 'COMMA')} + ' €'">0,00 €</div>
        </div>
        <div class="card">
            <div class="label">Avoimet laskut</div>
            <div class="value" th:classappend="${overdueCount > 0} ? 'negative'"
                 th:text="${#lists.size(unpaidInvoices)}">0</div>
            <div class="hint" th:if="${overdueCount > 0}"
                 th:text="${overdueCount} + ' erääntynyt!'"></div>
        </div>
    </div>

    <div class="actions">
        <a class="btn" th:href="@{/ledger/new}">+ Uusi kirjaus</a>
        <a class="btn secondary" th:href="@{/invoices/new}">+ Uusi lasku</a>
    </div>

    <h2>Avoimet laskut</h2>
    <p class="hint" th:if="${#lists.isEmpty(unpaidInvoices)}">Ei avoimia laskuja.</p>
    <table th:unless="${#lists.isEmpty(unpaidInvoices)}">
        <thead>
        <tr>
            <th>Nro</th>
            <th>Asiakas</th>
            <th>Eräpäivä</th>
            <th class="num">Summa</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="invoice : ${unpaidInvoices}">
            <td><a th:href="@{/invoices/{id}(id=${invoice.id})}" th:text="${invoice.invoiceNumber}">101</a></td>
            <td th:text="${invoice.customer.name}">Asiakas</td>
            <td>
                <span th:text="${#temporals.format(invoice.dueDate, 'd.M.yyyy')}">1.1.2026</span>
                <span class="badge overdue" th:if="${invoice.overdue}">Erääntynyt</span>
            </td>
            <td class="num" th:text="${#numbers.formatDecimal(invoice.grossTotal, 1, 'WHITESPACE', 2, 'COMMA')} + ' €'">0,00 €</td>
            <td><a class="btn small secondary" th:href="@{/invoices/{id}(id=${invoice.id})}">Avaa</a></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
