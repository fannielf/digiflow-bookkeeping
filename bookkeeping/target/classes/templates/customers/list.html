<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fi">
<head th:replace="~{fragments :: head('Asiakkaat')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <div th:replace="~{fragments :: messages}"></div>

    <h1>Asiakkaat</h1>

    <div class="actions">
        <a class="btn" th:href="@{/customers/new}">+ Uusi asiakas</a>
    </div>

    <p class="hint" th:if="${#lists.isEmpty(customers)}">Ei asiakkaita vielä.</p>
    <table th:unless="${#lists.isEmpty(customers)}">
        <thead>
        <tr>
            <th>Nimi</th>
            <th>Y-tunnus</th>
            <th>Paikkakunta</th>
            <th>Sähköposti</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${customers}">
            <td th:text="${customer.name}">Asiakas Oy</td>
            <td th:text="${customer.businessId}"></td>
            <td th:text="${customer.city}"></td>
            <td th:text="${customer.email}"></td>
            <td style="white-space: nowrap">
                <a class="btn small secondary" th:href="@{/customers/{id}/edit(id=${customer.id})}">Muokkaa</a>
                <form class="inline" th:action="@{/customers/{id}/delete(id=${customer.id})}" method="post"
                      onsubmit="return confirm('Poistetaanko asiakas?');">
                    <button class="btn small danger" type="submit">Poista</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
